<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>HANC SIGNAL</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
    }

    #game-container {
      position: relative;

      width: 100vw;
      height: 100vh;

      overflow: hidden;
    }

    /* BACKGROUND IMAGE */

    #hanc {
      position: absolute;

      width: 280px;

      left: 50%;
      top: 50%;

      transform: translate(-50%, -50%);

      opacity: 0.08;

      z-index: 1;

      pointer-events: none;
    }

    /* HUD */

    #hud {
      position: absolute;

      top: 20px;
      left: 20px;
      right: 20px;

      display: flex;
      justify-content: space-between;

      z-index: 20;

      font-size: 14px;

      letter-spacing: 2px;
    }

    .hidden {
      display: none !important;
    }

    /* MENUS */

    #start-screen,
    #game-over {
      position: absolute;

      inset: 0;

      display: flex;
      flex-direction: column;

      align-items: center;
      justify-content: center;

      z-index: 30;

      background: rgba(0,0,0,0.88);

      text-align: center;
    }

    .menu-hanc {
      width: 180px;

      margin-bottom: 30px;
    }

    h1,
    h2 {
      letter-spacing: 6px;

      margin-bottom: 20px;
    }

    p {
      margin-bottom: 35px;

      opacity: 0.7;

      letter-spacing: 2px;
    }

    button {
      background: transparent;

      color: white;

      border: 1px solid rgba(255,255,255,0.3);

      padding: 18px 30px;

      font-size: 12px;

      letter-spacing: 3px;

      cursor: pointer;
    }

    /* SIGNALS */

    .signal {
      position: absolute;

      width: 80px;
      height: 80px;

      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 10px;

      letter-spacing: 2px;

      z-index: 15;

      cursor: pointer;

      user-select: none;

      animation: pulse 1s infinite;
    }

    .good {
      background: rgba(255,255,255,0.1);

      border: 1px solid rgba(255,255,255,0.5);
    }

    .bad {
      background: rgba(255,0,0,0.12);

      border: 1px solid rgba(255,0,0,0.5);
    }

    @keyframes pulse {

      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }

      100% {
        transform: scale(1);
      }

    }

    /* EFFECTS */

    .noise {
      position: fixed;

      inset: 0;

      opacity: 0.03;

      pointer-events: none;

      z-index: 100;

      background-image:
        repeating-radial-gradient(
          circle at 0 0,
          transparent 0,
          #fff 1px,
          transparent 2px
        );
    }

    .scanline {
      position: fixed;

      inset: 0;

      pointer-events: none;

      z-index: 101;

      opacity: 0.08;

      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.03),
          rgba(255,255,255,0.03) 1px,
          transparent 1px,
          transparent 4px
        );
    }

  </style>

</head>

<body>

  <div class="noise"></div>
  <div class="scanline"></div>

  <div id="game-container">

    <!-- BACKGROUND -->

    <img
      src="assets/hanc.png"
      id="hanc"
      alt="HANC"
    />

    <!-- HUD -->

    <div id="hud" class="hidden">

      <div>
        SCORE:
        <span id="score">0</span>
      </div>

      <div>
        LIVES:
        <span id="lives">3</span>
      </div>

    </div>

    <!-- START SCREEN -->

    <div id="start-screen">

      <img
        src="assets/hanc.png"
        class="menu-hanc"
        alt="HANC"
      />

      <h1>HANC SIGNAL</h1>

      <p>
        TAP SIGNALS • AVOID VOID
      </p>

      <button id="start-button">
        START GAME
      </button>

    </div>

    <!-- GAME OVER -->

    <div
      id="game-over"
      class="hidden"
    >

      <h2>
        SIGNAL LOST
      </h2>

      <p>
        FINAL SCORE:
        <span id="final-score">0</span>
      </p>

      <button id="restart-button">
        RETRY
      </button>

    </div>

  </div>

  <script>

    const tg = window.Telegram.WebApp;

    if (tg) {
      tg.expand();
      tg.ready();
    }

    const gameContainer =
      document.getElementById("game-container");

    const scoreElement =
      document.getElementById("score");

    const livesElement =
      document.getElementById("lives");

    const finalScore =
      document.getElementById("final-score");

    const startButton =
      document.getElementById("start-button");

    const restartButton =
      document.getElementById("restart-button");

    const startScreen =
      document.getElementById("start-screen");

    const gameOverScreen =
      document.getElementById("game-over");

    const hud =
      document.getElementById("hud");

    let score = 0;
    let lives = 3;

    let gameStarted = false;

    let spawnInterval;

    function startGame() {

      score = 0;
      lives = 3;

      scoreElement.innerText = score;
      livesElement.innerText = lives;

      gameStarted = true;

      startScreen.classList.add("hidden");

      gameOverScreen.classList.add("hidden");

      hud.classList.remove("hidden");

      clearSignals();

      let speed = 1100;

      spawnSignal();

      clearInterval(spawnInterval);

      spawnInterval = setInterval(() => {

        spawnSignal();

        if (speed > 420) {

          speed -= 12;

          clearInterval(spawnInterval);

          spawnInterval = setInterval(() => {
            spawnSignal();
          }, speed);

        }

      }, speed);

    }

    function endGame() {

      gameStarted = false;

      clearInterval(spawnInterval);

      finalScore.innerText = score;

      gameOverScreen.classList.remove("hidden");

      clearSignals();

    }

    function clearSignals() {

      document
        .querySelectorAll(".signal")
        .forEach(signal => signal.remove());

    }

    function spawnSignal() {

      if (!gameStarted) return;

      const signal =
        document.createElement("div");

      signal.classList.add("signal");

      const badSignal =
        Math.random() < 0.25;

      if (badSignal) {

        signal.classList.add("bad");

        signal.innerText = "VOID";

      } else {

        signal.classList.add("good");

        signal.innerText = "SIGNAL";

      }

      const size = 80;

      const x =
        Math.random() *
        (window.innerWidth - size);

      const y =
        Math.random() *
        (window.innerHeight - size);

      signal.style.left = `${x}px`;
      signal.style.top = `${y}px`;

      gameContainer.appendChild(signal);

      signal.addEventListener("click", () => {

        if (!gameStarted) return;

        if (badSignal) {

          lives--;

          livesElement.innerText = lives;

          flashScreen();

          if (lives <= 0) {
            endGame();
          }

        } else {

          score++;

          scoreElement.innerText = score;

          if (score % 10 === 0) {
            glitchEffect();
          }

        }

        signal.remove();

      });

      setTimeout(() => {

        if (signal.parentNode) {

          signal.remove();

          if (!badSignal && gameStarted) {

            lives--;

            livesElement.innerText = lives;

            if (lives <= 0) {
              endGame();
            }

          }

        }

      }, 1300);

    }

    function flashScreen() {

      document.body.style.filter =
        "brightness(1.6)";

      setTimeout(() => {
        document.body.style.filter = "none";
      }, 100);

    }

    function glitchEffect() {

      document.body.style.transform =
        "translateX(5px)";

      setTimeout(() => {
        document.body.style.transform =
          "translateX(-5px)";
      }, 40);

      setTimeout(() => {
        document.body.style.transform =
          "translateX(0px)";
      }, 80);

    }

    startButton.addEventListener(
      "click",
      startGame
    );

    restartButton.addEventListener(
      "click",
      startGame
    );

  </script>

</body>
</html>
